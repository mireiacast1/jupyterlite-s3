<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Loading Notebook - JupyterLite</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 15px;
        }
        
        .status {
            font-size: 16px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .notebook-name {
            font-size: 14px;
            color: #999;
            font-family: 'Courier New', monospace;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            margin: 20px 0;
            word-break: break-all;
        }
        
        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c00;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .success {
            background: #efe;
            border: 1px solid #cfc;
            color: #060;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .progress {
            width: 100%;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h1 id="title">📓 Loading Notebook</h1>
        <div class="status" id="status">Initializing...</div>
        <div class="notebook-name" id="notebookName" style="display: none;"></div>
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div id="message"></div>
    </div>

    <script>
        (async function() {
            const $ = id => document.getElementById(id);
            const setProgress = pct => $('progressBar').style.width = pct + '%';
            const setStatus = txt => $('status').textContent = txt;
            
            const params = new URLSearchParams(window.location.search);
            const fromURL = params.get('fromURL');
            
            console.log('🚀 Notebook Loader');
            console.log('📍 fromURL:', fromURL);
            
            if (!fromURL) {
                showError('Missing fromURL parameter in URL');
                return;
            }
            
            try {
                // Paso 1: Descargar notebook
                setStatus('Downloading notebook from S3...');
                setProgress(25);
                
                const response = await fetch(fromURL);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const notebook = await response.json();
                console.log('✅ Notebook downloaded:', notebook);
                
                if (!notebook.cells) {
                    throw new Error('Invalid notebook format (no cells found)');
                }
                
                setProgress(50);
                
                // Paso 2: Extraer nombre
                const urlObj = new URL(fromURL);
                const s3uri = urlObj.searchParams.get('s3uri') || '';
                const notebookName = s3uri.split('/').pop() || 'notebook.ipynb';
                
                $('notebookName').textContent = notebookName;
                $('notebookName').style.display = 'block';
                
                console.log('📓 Notebook name:', notebookName);
                
                setStatus('Preparing JupyterLab...');
                setProgress(75);
                
                // Paso 3: Guardar en IndexedDB
                await saveNotebook(notebookName, notebook);
                
                setProgress(100);
                
                // Paso 4: Redireccionar a JupyterLab
                $('spinner').style.display = 'none';
                showSuccess(notebookName);
                
                // Auto-redirect después de 2 segundos
                setTimeout(() => {
                    redirectToLab(notebookName);
                }, 2000);
                
            } catch (error) {
                console.error('❌ Error:', error);
                showError(error.message);
            }
            
            async function saveNotebook(name, content) {
                return new Promise((resolve, reject) => {
                    const dbName = 'JupyterLite Storage';
                    const request = indexedDB.open(dbName);
                    
                    request.onsuccess = (event) => {
                        const db = event.target.result;
                        const storeName = 'files';
                        
                        if (!db.objectStoreNames.contains(storeName)) {
                            console.warn('⚠️ IndexedDB store not found, using localStorage fallback');
                            localStorage.setItem('jupyterlite_notebook_' + name, JSON.stringify(content));
                            resolve();
                            return;
                        }
                        
                        try {
                            const tx = db.transaction([storeName], 'readwrite');
                            const store = tx.objectStore(storeName);
                            
                            const fileData = {
                                name: name,
                                path: name,
                                type: 'notebook',
                                format: 'json',
                                content: content,
                                created: new Date().toISOString(),
                                last_modified: new Date().toISOString(),
                                mimetype: 'application/x-ipynb+json',
                                writable: true
                            };
                            
                            const putRequest = store.put(fileData, name);
                            
                            putRequest.onsuccess = () => {
                                console.log('✅ Saved to IndexedDB');
                                resolve();
                            };
                            
                            putRequest.onerror = (err) => {
                                console.warn('⚠️ IndexedDB save failed:', err);
                                localStorage.setItem('jupyterlite_notebook_' + name, JSON.stringify(content));
                                resolve();
                            };
                            
                        } catch (err) {
                            console.warn('⚠️ Transaction error:', err);
                            localStorage.setItem('jupyterlite_notebook_' + name, JSON.stringify(content));
                            resolve();
                        }
                    };
                    
                    request.onerror = () => {
                        console.warn('⚠️ IndexedDB open failed, using localStorage');
                        localStorage.setItem('jupyterlite_notebook_' + name, JSON.stringify(content));
                        resolve();
                    };
                });
            }
            
            function redirectToLab(notebookName) {
                const pathParts = window.location.pathname.split('/');
                pathParts.pop();
                const basePath = pathParts.join('/');
                const labURL = `${basePath}/lab/index.html`;
                
                console.log('🚀 Redirecting to:', labURL);
                window.location.href = labURL;
            }
            
            function showSuccess(notebookName) {
                setStatus('✅ Ready!');
                $('message').innerHTML = `
                    <div class="success">
                        <strong>✅ Notebook loaded successfully!</strong>
                        <p style="margin-top: 10px;">
                            Opening JupyterLab...<br>
                            Look for: <code>${notebookName}</code>
                        </p>
                    </div>
                `;
            }
            
            function showError(message) {
                $('spinner').style.display = 'none';
                $('title').textContent = '❌ Error';
                setStatus('');
                
                const pathParts = window.location.pathname.split('/');
                pathParts.pop();
                const basePath = pathParts.join('/');
                const labURL = `${basePath}/lab/index.html`;
                
                $('message').innerHTML = `
                    <div class="error">
                        <strong>Error:</strong><br>
                        ${message}
                        <br><br>
                        <button onclick="window.location.href='${labURL}'">
                            Open JupyterLab anyway
                        </button>
                    </div>
                `;
            }
        })();
    </script>
</body>
</html>
