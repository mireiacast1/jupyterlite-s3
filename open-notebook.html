<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Loading Notebook...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .loader {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h2 {
            margin: 0 0 10px 0;
            color: #333;
        }
        
        p {
            color: #666;
            margin: 10px 0;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        iframe {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 9999;
        }
        
        iframe.loaded {
            display: block;
        }
    </style>
</head>
<body>
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <h2>📓 Loading Notebook</h2>
        <p id="status">Initializing...</p>
        <div class="error" id="error"></div>
    </div>
    
    <iframe id="jupyterlab"></iframe>
    
    <script>
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const notebookUrl = params.get('fromURL');
            const status = document.getElementById('status');
            const errorDiv = document.getElementById('error');
            const iframe = document.getElementById('jupyterlab');
            const loader = document.getElementById('loader');
            
            console.log('🚀 Notebook Loader started');
            console.log('📍 URL params:', Object.fromEntries(params));
            
            if (!notebookUrl) {
                showError('Missing fromURL parameter. Add ?fromURL=ENCODED_URL to the URL.');
                return;
            }
            
            try {
                // 1. Descargar notebook
                status.textContent = 'Downloading notebook from S3...';
                console.log('📥 Fetching:', notebookUrl);
                
                const response = await fetch(notebookUrl);
                
                if (!response.ok) {
                    throw new Error(`Failed to download notebook: HTTP ${response.status} ${response.statusText}`);
                }
                
                const notebook = await response.json();
                console.log('✅ Notebook downloaded:', notebook);
                
                // Validar que es un notebook válido
                if (!notebook.cells || !notebook.metadata) {
                    throw new Error('Invalid notebook format (missing cells or metadata)');
                }
                
                // 2. Extraer nombre del notebook
                const urlObj = new URL(notebookUrl);
                const s3uri = urlObj.searchParams.get('s3uri') || urlObj.pathname;
                const notebookName = s3uri.split('/').pop() || 'notebook.ipynb';
                
                console.log('📓 Notebook name:', notebookName);
                
                // 3. Guardar temporalmente
                status.textContent = `Preparing ${notebookName}...`;
                
                const notebookData = {
                    name: notebookName,
                    content: notebook,
                    timestamp: Date.now()
                };
                
                localStorage.setItem('jupyterlite_pending_notebook', JSON.stringify(notebookData));
                console.log('💾 Notebook saved to localStorage');
                
                // 4. Cargar JupyterLab con ruta absoluta
                status.textContent = 'Loading JupyterLab...';
                console.log('🔄 Loading JupyterLab iframe');
                
                // Construir ruta base correcta
                const pathParts = window.location.pathname.split('/');
                pathParts.pop(); // Quitar 'open-notebook.html'
                const basePath = pathParts.join('/');
                
                // URL absoluta de JupyterLab
                const labUrl = `${basePath}/lab/index.html`;
                console.log('📍 Lab URL:', labUrl);
                
                iframe.src = labUrl;
                
                // 5. Timeout - simplemente mostrar JupyterLab después de 8 segundos
                setTimeout(() => {
                    console.log('⏱️ Showing JupyterLab');
                    loader.style.display = 'none';
                    iframe.classList.add('loaded');
                    
                    // Mostrar instrucción al usuario
                    console.log('ℹ️ To open notebook: File → Open → ' + notebookName);
                    console.log('ℹ️ Or check localStorage: jupyterlite_pending_notebook');
                }, 8000);
                
            } catch (error) {
                console.error('❌ Error:', error);
                showError(error.message);
            }
            
            function showError(message) {
                status.textContent = 'Error';
                errorDiv.innerHTML = `
                    ⚠️ ${message}<br><br>
                    <button onclick="window.location.href='${window.location.pathname.split('/').slice(0, -1).join('/')}/lab/index.html'" 
                            style="padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer;">
                        Open JupyterLab anyway
                    </button>
                `;
                errorDiv.style.display = 'block';
            }
        })();
    </script>
</body>
</html>
