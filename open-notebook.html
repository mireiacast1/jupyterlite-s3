<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Loading</title>
<style>body{margin:0;padding:20px;font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;}.c{background:#fff;color:#333;padding:40px;border-radius:16px;text-align:center;max-width:500px;}.s{width:50px;height:50px;border:4px solid #f3f3f3;border-top-color:#667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;}@keyframes spin{to{transform:rotate(360deg);}}button{padding:15px 30px;background:#667eea;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:15px;}button:hover{background:#5568d3;}</style>
</head><body><div class="c"><div class="s" id="sp"></div><h1>Loading</h1><p id="st">Initializing...</p><div id="msg"></div></div>
<script>(async()=>{const u=new URLSearchParams(location.search).get('fromURL');const st=document.getElementById('st');const sp=document.getElementById('sp');const msg=document.getElementById('msg');if(!u){st.textContent='Error: No fromURL';sp.style.display='none';return;}try{st.textContent='Downloading...';const r=await fetch(u);if(!r.ok)throw new Error('HTTP '+r.status);const nb=await r.json();const name=(new URL(u)).searchParams.get('s3uri').split('/').pop();localStorage.setItem('jl_nb_'+name,JSON.stringify(nb));st.textContent='Ready!';sp.style.display='none';msg.innerHTML='<button onclick=\"location.href=\\'./lab/index.html\\'\"">Open JupyterLab</button>';setTimeout(()=>location.href='./lab/index.html',2000);}catch(e){st.textContent='Error: '+e.message;sp.style.display='none';}})();</script>
</body></html>
