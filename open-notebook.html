<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Loading Notebook...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .loader {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h2 {
            margin: 0 0 10px 0;
            color: #333;
        }
        
        p {
            color: #666;
            margin: 10px 0;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        iframe {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 9999;
        }
        
        iframe.loaded {
            display: block;
        }
    </style>
</head>
<body>
    <div class="loader" id="loader">
        <div class="spinner"></div>
        <h2>📓 Loading Notebook</h2>
        <p id="status">Initializing...</p>
        <div class="error" id="error"></div>
    </div>
    
    <iframe id="jupyterlab"></iframe>
    
    <script>
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const notebookUrl = params.get('fromURL');
            const status = document.getElementById('status');
            const errorDiv = document.getElementById('error');
            const iframe = document.getElementById('jupyterlab');
            const loader = document.getElementById('loader');
            
            console.log('🚀 Notebook Loader started');
            console.log('📍 URL params:', Object.fromEntries(params));
            
            if (!notebookUrl) {
                showError('Missing fromURL parameter. Add ?fromURL=ENCODED_URL to the URL.');
                return;
            }
            
            try {
                // 1. Descargar notebook
                status.textContent = 'Downloading notebook from S3...';
                console.log('📥 Fetching:', notebookUrl);
                
                const response = await fetch(notebookUrl);
                
                if (!response.ok) {
                    throw new Error(`Failed to download notebook: HTTP ${response.status} ${response.statusText}`);
                }
                
                const notebook = await response.json();
                console.log('✅ Notebook downloaded:', notebook);
                
                // Validar que es un notebook válido
                if (!notebook.cells || !notebook.metadata) {
                    throw new Error('Invalid notebook format (missing cells or metadata)');
                }
                
                // 2. Extraer nombre del notebook
                const urlObj = new URL(notebookUrl);
                const s3uri = urlObj.searchParams.get('s3uri') || urlObj.pathname;
                const notebookName = s3uri.split('/').pop() || 'notebook.ipynb';
                
                console.log('📓 Notebook name:', notebookName);
                
                // 3. Guardar temporalmente
                status.textContent = `Preparing ${notebookName}...`;
                
                const notebookData = {
                    name: notebookName,
                    content: notebook,
                    timestamp: Date.now()
                };
                
                localStorage.setItem('jupyterlite_pending_notebook', JSON.stringify(notebookData));
                console.log('💾 Notebook saved to localStorage');
                
                // 4. Cargar JupyterLab
                status.textContent = 'Loading JupyterLab...';
                console.log('🔄 Loading JupyterLab iframe');
                
                iframe.src = './lab/index.html?autoload=true';
                
                // 5. Escuchar mensaje de JupyterLab cuando esté listo
                let notebookOpened = false;
                
                window.addEventListener('message', async (event) => {
                    if (event.data.type === 'jupyterlab_ready' && !notebookOpened) {
                        notebookOpened = true;
                        console.log('✅ JupyterLab ready, opening notebook');
                        
                        try {
                            // Enviar comando para abrir notebook
                            iframe.contentWindow.postMessage({
                                type: 'open_notebook',
                                notebook: notebookData
                            }, '*');
                            
                            // Esperar confirmación
                            setTimeout(() => {
                                console.log('✅ Notebook should be open');
                                loader.style.display = 'none';
                                iframe.classList.add('loaded');
                                localStorage.removeItem('jupyterlite_pending_notebook');
                            }, 2000);
                            
                        } catch (err) {
                            console.error('❌ Error opening notebook:', err);
                            showError('Could not open notebook: ' + err.message);
                        }
                    }
                });
                
                // Timeout si JupyterLab no responde
                setTimeout(() => {
                    if (!notebookOpened) {
                        console.log('⏱️ Timeout waiting for JupyterLab, showing anyway');
                        loader.style.display = 'none';
                        iframe.classList.add('loaded');
                    }
                }, 10000);
                
            } catch (error) {
                console.error('❌ Error:', error);
                showError(error.message);
            }
            
            function showError(message) {
                status.textContent = 'Error';
                errorDiv.textContent = '⚠️ ' + message;
                errorDiv.style.display = 'block';
                
                // Mostrar botón para intentar abrir JupyterLab de todas formas
                const retryBtn = document.createElement('button');
                retryBtn.textContent = 'Open JupyterLab anyway';
                retryBtn.style.cssText = 'margin-top: 15px; padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer;';
                retryBtn.onclick = () => {
                    window.location.href = './lab/index.html';
                };
                errorDiv.appendChild(retryBtn);
            }
        })();
    </script>
</body>
</html>
