<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Loading Notebook</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            background: #fff;
            color: #333;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 500px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        button {
            padding: 15px 30px;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 16px;
        }
        button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h1>Loading Notebook</h1>
        <p id="status">Initializing...</p>
        <div id="message"></div>
    </div>
    
    <script>
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const fromURL = params.get('fromURL');
            const status = document.getElementById('status');
            const spinner = document.getElementById('spinner');
            const message = document.getElementById('message');
            
            console.log('fromURL:', fromURL);
            
            if (!fromURL) {
                status.textContent = 'Error: Missing fromURL parameter';
                spinner.style.display = 'none';
                return;
            }
            
            try {
                status.textContent = 'Downloading notebook...';
                console.log('Downloading:', fromURL);
                
                const response = await fetch(fromURL);
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                
                const notebook = await response.json();
                console.log('Notebook downloaded');
                
                const urlObj = new URL(fromURL);
                const s3uri = urlObj.searchParams.get('s3uri') || '';
                const notebookName = s3uri.split('/').pop() || 'notebook.ipynb';
                
                console.log('Notebook name:', notebookName);
                
                status.textContent = 'Saving...';
                localStorage.setItem('jl_nb_' + notebookName, JSON.stringify(notebook));
                console.log('Saved to localStorage');
                
                status.textContent = 'Ready!';
                spinner.style.display = 'none';
                
                message.innerHTML = '<p>Notebook saved: <strong>' + notebookName + '</strong></p>' +
                                    '<button onclick="location.href=\'./lab/index.html\'">Open JupyterLab</button>';
                
                setTimeout(function() {
                    window.location.href = './lab/index.html';
                }, 2000);
                
            } catch (error) {
                console.error('Error:', error);
                status.textContent = 'Error: ' + error.message;
                spinner.style.display = 'none';
            }
        })();
    </script>
</body>
</html>
