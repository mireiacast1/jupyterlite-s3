<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Loading Notebook</title>
<style>
body{margin:0;padding:20px;font-family:Arial;background:#667eea;color:#fff;text-align:center;}
.spinner{width:50px;height:50px;border:5px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:50px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="spinner"></div>
<h1>Loading Notebook...</h1>
<p id="status">Initializing...</p>
<script>
(async()=>{
const u=new URLSearchParams(location.search).get('fromURL');
const s=document.getElementById('status');
if(!u){s.textContent='Error: No fromURL';return;}
try{
s.textContent='Downloading...';
const r=await fetch(u);
const nb=await r.json();
const name=(new URL(u)).searchParams.get('s3uri').split('/').pop();
localStorage.setItem('jl_nb_'+name,JSON.stringify(nb));
s.textContent='Redirecting...';
setTimeout(()=>location.href='./lab/index.html',2000);
}catch(e){
s.textContent='Error: '+e.message;
}
})();
</script>
</body>
</html>
